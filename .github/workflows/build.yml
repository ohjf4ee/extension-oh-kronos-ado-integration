name: Build Extension

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Stage extension files
        run: |
          mkdir -p dist
          cp manifest.json background.js contentScript.js dist/
          cp -r src lib icons dist/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: edge-extension
          path: dist/
